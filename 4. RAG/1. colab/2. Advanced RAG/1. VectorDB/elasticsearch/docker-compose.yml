version: '3.8'  # Docker Compose 파일 버전

services:
  ############################################################
  # Elasticsearch (Single Node for Development)
  ############################################################
  elasticsearch:
    # Elasticsearch 공식 이미지 사용
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.1
    
    # 컨테이너 이름 지정
    container_name: elasticsearch
    
    # 환경 변수 설정
    environment:
      # Single-node 클러스터 설정 (개발용)
      - discovery.type=single-node
      
      # 보안 설정 비활성화 (개발 환경용, 운영에서는 활성화 권장)
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
      
      # 메모리 설정 (JVM Heap Size)
      # 운영 환경에서는 시스템 메모리의 50% 권장 (최대 31GB)
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      
      # 네트워크 설정
      - network.host=0.0.0.0
      
      # 클러스터 이름
      - cluster.name=elasticsearch-cluster
      
      # 노드 이름
      - node.name=elasticsearch-node-1
      
    # 포트 매핑
    ports:
      - "9200:9200"  # REST API 포트 (HTTP)
      - "9300:9300"  # 노드 간 통신 포트 (TCP)
    
    # 데이터 영속성을 위한 볼륨 마운트
    # 컨테이너 재시작 시에도 데이터가 유지됩니다
    volumes:
      - ./database:/usr/share/elasticsearch/data
    
    # 헬스체크 설정
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    
    # 재시작 정책
    restart: unless-stopped
    
    # 리소스 제한 (선택사항)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 2G
    #     reservations:
    #       memory: 1G

  ############################################################
  # Kibana (Elasticsearch Web UI)
  ############################################################
  kibana:
    # Kibana 공식 이미지 (Elasticsearch와 동일한 버전 사용)
    image: docker.elastic.co/kibana/kibana:8.12.1
    
    # 컨테이너 이름 지정
    container_name: kibana
    
    # 환경 변수 설정
    environment:
      # Elasticsearch 연결 설정
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      
      # Kibana 서버 설정
      - SERVER_NAME=kibana
      - SERVER_HOST=0.0.0.0
      
      # 다국어 설정 (한국어)
      - I18N_LOCALE=ko-KR
      
    # 포트 매핑
    ports:
      - "5601:5601"  # Kibana Web UI
    
    # Elasticsearch가 먼저 실행되어야 함
    depends_on:
      elasticsearch:
        condition: service_healthy
    
    # 헬스체크 설정
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    
    # 재시작 정책
    restart: unless-stopped

############################################################
# 디렉토리 구조
# ├── docker-compose.yml
# └── database/              # Elasticsearch 데이터 저장 디렉토리
#
# 접속 정보:
# - Elasticsearch REST API: http://localhost:9200
# - Kibana Web UI:          http://localhost:5601
#
# 주요 엔드포인트:
# - 클러스터 상태:           GET http://localhost:9200/_cluster/health
# - 인덱스 목록:            GET http://localhost:9200/_cat/indices?v
# - 노드 정보:              GET http://localhost:9200/_cat/nodes?v
#
# 운영 환경 고려사항:
# 1. xpack.security.enabled=true 설정 (보안 활성화)
# 2. SSL/TLS 인증서 설정
# 3. 메모리 설정 최적화 (시스템 메모리의 50%, 최대 31GB)
# 4. 디스크 워터마크 설정
# 5. 정기적인 백업 및 스냅샷 설정
############################################################

