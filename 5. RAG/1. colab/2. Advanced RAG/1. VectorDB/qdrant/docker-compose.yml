version: '3.8'

services:
  # Qdrant 벡터 데이터베이스 서비스
  qdrant:
    # Qdrant 공식 이미지 사용 (최신 버전)
    image: qdrant/qdrant:latest
    
    # 컨테이너 이름 지정
    container_name: qdrant
    
    # 포트 매핑
    # 6333: REST API 포트 (클라이언트 연결용)
    # 6334: gRPC 포트 (고성능 통신용)
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    
    # 데이터 영속성을 위한 볼륨 마운트
    # 컨테이너 재시작 시에도 데이터가 유지됩니다
    volumes:
      - ./qdrant_storage:/qdrant/storage  # 벡터 데이터 저장소
      - ./qdrant_snapshots:/qdrant/snapshots  # 백업 스냅샷 저장소
    
    # 환경 변수 설정
    environment:
      # 로그 레벨 설정 (DEBUG, INFO, WARN, ERROR)
      - QDRANT__LOG_LEVEL=INFO
      
      # 서비스 설정
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      
      # 스토리지 설정
      - QDRANT__STORAGE__STORAGE_PATH=/qdrant/storage
      - QDRANT__STORAGE__SNAPSHOTS_PATH=/qdrant/snapshots
      
      # 성능 최적화 설정
      # WAL (Write-Ahead Log) 설정 - 데이터 안정성 보장
      - QDRANT__STORAGE__WAL__WAL_CAPACITY_MB=32
      - QDRANT__STORAGE__WAL__WAL_SEGMENTS_AHEAD=0
      
      # 옵션: API 키 설정 (보안 강화)
      # - QDRANT__SERVICE__API_KEY=your-secret-api-key
      
      # 옵션: 읽기 전용 API 키 설정
      # - QDRANT__SERVICE__READ_ONLY_API_KEY=your-read-only-key
    
    # 재시작 정책
    restart: always



  # 옵션: Qdrant Web UI (별도로 제공되지 않음, REST API로 접근)
  # Qdrant는 내장 Web UI를 제공합니다
  # 브라우저에서 http://localhost:6333/dashboard 접속

